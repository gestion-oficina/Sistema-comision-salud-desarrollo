<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Actividades Institucionales</title>
    <!-- Tailwind CSS para un diseño moderno -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-700 p-2.5 rounded-lg">
                    <i class="fa-solid fa-calendar-check text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Control de Actividades</h1>
                    <p class="text-xs text-blue-200">Panel de Seguimiento y Reportes</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <!-- Botón Exportar a CSV -->
                <button onclick="exportarCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-file-excel"></i> Exportar CSV
                </button>
                <button onclick="abrirModalNuevo()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus"></i> Nueva Actividad
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">

        <!-- Barra de Filtros y Selector de Vista -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <div class="relative flex-grow sm:flex-grow-0">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-search"></i>
                    </span>
                    <input type="text" id="inputBuscar" oninput="filtrarActividades()" placeholder="Buscar por título, lugar..." class="w-full sm:w-64 pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <select id="filtroEstado" onchange="filtrarActividades()" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="todos">Todos los Estados</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Proceso">En Proceso</option>
                    <option value="Completada">Completada</option>
                </select>
            </div>

            <!-- Selector de Vista (Lista / Calendario Mensual) -->
            <div class="flex bg-gray-100 p-1 rounded-lg w-full md:w-auto justify-center">
                <button onclick="cambiarVista('lista')" id="btnVistaLista" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-white text-blue-600 shadow-sm">
                    <i class="fa-solid fa-list mr-1.5"></i> Tarjetas
                </button>
                <button onclick="cambiarVista('calendario')" id="btnVistaCalendario" class="px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-600 hover:text-blue-600">
                    <i class="fa-solid fa-calendar-days mr-1.5"></i> Calendario
                </button>
            </div>
        </div>

        <!-- Vista de Lista (Tarjetas) -->
        <div id="contenedorLista" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Las tarjetas se inyectan dinámicamente mediante JavaScript -->
        </div>

        <!-- Vista de Calendario Mensual -->
        <div id="contenedorCalendario" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5">
            <div class="flex justify-between items-center mb-6">
                <button onclick="mesAnterior()" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 id="tituloMesAno" class="text-lg font-bold text-gray-800 capitalize"></h2>
                <button onclick="mesSiguiente()" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center font-semibold text-xs text-gray-400 mb-2">
                <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
            </div>
            <div id="gridCalendario" class="grid grid-cols-7 gap-1">
                <!-- Los días del mes se generan por JS -->
            </div>
        </div>

        <!-- Estado vacío genérico -->
        <div id="estadoVacio" class="hidden text-center py-16 bg-white rounded-xl border border-gray-100 shadow-sm mt-4">
            <div class="text-gray-300 text-4xl mb-3"><i class="fa-solid fa-folder-open"></i></div>
            <p class="text-gray-500 font-medium">No se encontraron actividades registradas.</p>
        </div>

    </main>

    <!-- Modal para Nueva / Editar Actividad -->
    <div id="modalActividad" class="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="bg-blue-900 px-6 py-4 flex justify-between items-center text-white">
                <h3 id="modalTitulo" class="font-bold text-lg">Registrar Nueva Actividad</h3>
                <button onclick="cerrarModal()" class="text-blue-200 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="formActividad" onsubmit="guardarActividad(event)" class="p-6 space-y-4">
                <input type="hidden" id="actividadId">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Título de la Actividad</label>
                    <input type="text" id="titulo" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Cobertura de evento institucional">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Fecha</label>
                        <input type="date" id="fecha" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Hora</label>
                        <input type="time" id="hora" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Lugar / Ubicación</label>
                    <input type="text" id="lugar" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Sala de Reuniones Principal">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Estado</label>
                    <select id="estado" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Completada">Completada</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Descripción / Notas</label>
                    <textarea id="descripcion" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Detalles de las actividades realizadas..."></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="cerrarModal()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg shadow-sm transition">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-4 mt-auto text-center text-xs text-gray-400">
        Sistema de Control Institucional &copy; 2026
    </footer>

    <!-- Lógica JavaScript -->
    <script>
        // Datos de ejemplo iniciales
        let actividades = JSON.parse(localStorage.getItem('actividades_inst')) || [
            { id: 1, titulo: "Cobertura de Sesión Ordinaria", fecha: "2026-07-24", hora: "09:00", lugar: "Salón de Sesiones", estado: "Pendiente", descripcion: "Registro fotográfico y audiovisual de la plenaria." },
            { id: 2, titulo: "Entrevista Institucional", fecha: "2026-07-20", hora: "10:30", lugar: "Oficina de Prensa", estado: "Completada", descripcion: "Grabación de material para boletín informativo semanal." },
            { id: 3, titulo: "Revisión de Equipos Audiovisuales", fecha: "2026-07-25", hora: "14:00", lugar: "Estudio de Edición", estado: "En Proceso", descripcion: "Mantenimiento preventivo a cámaras y micrófonos." }
        ];

        let vistaActual = 'lista';
        let fechaCalendario = new Date();

        // Inicializar la aplicación al cargar
        document.addEventListener('DOMContentLoaded', () => {
            renderizar();
        });

        function cambiarVista(vista) {
            vistaActual = vista;
            const btnLista = document.getElementById('btnVistaLista');
            const btnCal = document.getElementById('btnVistaCalendario');
            const contLista = document.getElementById('contenedorLista');
            const contCal = document.getElementById('contenedorCalendario');

            if (vista === 'lista') {
                btnLista.className = "px-4 py-1.5 rounded-md text-sm font-medium transition bg-white text-blue-600 shadow-sm";
                btnCal.className = "px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-600 hover:text-blue-600";
                contLista.classList.remove('hidden');
                contCal.classList.add('hidden');
            } else {
                btnCal.className = "px-4 py-1.5 rounded-md text-sm font-medium transition bg-white text-blue-600 shadow-sm";
                btnLista.className = "px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-600 hover:text-blue-600";
                contCal.classList.remove('hidden');
                contLista.classList.add('hidden');
                renderizarCalendario();
            }
            renderizar();
        }

        function obtenerActividadesFiltradas() {
            const buscar = document.getElementById('inputBuscar').value.toLowerCase();
            const estadoFiltro = document.getElementById('filtroEstado').value;

            return actividades.filter(item => {
                const coincideTexto = item.titulo.toLowerCase().includes(buscar) || item.lugar.toLowerCase().includes(buscar);
                const coincideEstado = estadoFiltro === 'todos' || item.estado === estadoFiltro;
                return coincideTexto && coincideEstado;
            });
        }

        function renderizar() {
            const listaFiltrada = obtenerActividadesFiltradas();
            const contenedor = document.getElementById('contenedorLista');
            const estadoVacio = document.getElementById('estadoVacio');

            contenedor.innerHTML = '';

            if (listaFiltrada.length === 0) {
                estadoVacio.classList.remove('hidden');
                return;
            } else {
                estadoVacio.classList.add('hidden');
            }

            const hoyStr = new Date().toISOString().split('T')[0];

            listaFiltrada.forEach(item => {
                // Cálculo de alertas de vencimiento
                let badgeAlerta = '';
                if (item.estado !== 'Completada') {
                    if (item.fecha === hoyStr) {
                        badgeAlerta = `<span class="bg-amber-100 text-amber-700 text-xs px-2 py-0.5 rounded-full font-semibold flex items-center gap-1"><i class="fa-solid fa-triangle-exclamation"></i> Para Hoy</span>`;
                    } else if (item.fecha < hoyStr) {
                        badgeAlerta = `<span class="bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded-full font-semibold flex items-center gap-1"><i class="fa-solid fa-circle-exclamation"></i> Vencida</span>`;
                    }
                }

                // Color según estado
                let colorEstado = "bg-blue-100 text-blue-700";
                if(item.estado === 'Completada') colorEstado = "bg-emerald-100 text-emerald-700";
                if(item.estado === 'En Proceso') colorEstado = "bg-indigo-100 text-indigo-700";

                const tarjeta = document.createElement('div');
                tarjeta.className = `bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition relative overflow-hidden`;
                
                tarjeta.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-2 mb-3">
                            <span class="text-xs font-semibold px-2.5 py-1 rounded-md ${colorEstado}">${item.estado}</span>
                            <div class="flex items-center gap-2">
                                ${badgeAlerta}
                                <div class="flex gap-1">
                                    <button onclick="editarActividad(${item.id})" class="text-gray-400 hover:text-blue-600 p-1 transition"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="eliminarActividad(${item.id})" class="text-gray-400 hover:text-red-600 p-1 transition"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>
                            </div>
                        </div>
                        <h3 class="font-bold text-gray-900 mb-2">${item.titulo}</h3>
                        <p class="text-xs text-gray-600 line-clamp-2 mb-4">${item.descripcion || 'Sin descripción detallada.'}</p>
                    </div>
                    <div class="border-t border-gray-100 pt-3 text-xs text-gray-500 space-y-1">
                        <div class="flex items-center gap-2"><i class="fa-regular fa-calendar text-gray-400 w-4"></i> ${item.fecha} - ${item.hora}</div>
                        <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot text-gray-400 w-4"></i> ${item.lugar}</div>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });

            if (vistaActual === 'calendario') {
                renderizarCalendario();
            }
        }

        // Lógica del Calendario Mensual
        function renderizarCalendario() {
            const grid = document.getElementById('gridCalendario');
            const tituloMes = document.getElementById('tituloMesAno');
            grid.innerHTML = '';

            const año = fechaCalendario.getFullYear();
            const mes = fechaCalendario.getMonth();

            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            tituloMes.innerText = `${nombresMeses[mes]} ${año}`;

            const primerDiaDelMes = new Date(año, mes, 1);
            let diaInicioSemana = primerDiaDelMes.getDay() - 1; // Lunes como primer día
            if (diaInicioSemana === -1) diaInicioSemana = 6;

            const ultimoDia = new Date(año, mes + 1, 0).getDate();

            // Rellenar espacios vacíos previos al primer día
            for (let i = 0; i < diaInicioSemana; i++) {
                const celdaVacia = document.createElement('div');
                celdaVacia.className = "h-24 bg-gray-50/50 rounded-lg border border-transparent";
                grid.appendChild(celdaVacia);
            }

            // Días del mes
            for (let dia = 1; dia <= ultimoDia; dia++) {
                const fechaStr = `${año}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const celda = document.createElement('div');
                celda.className = "h-24 bg-white rounded-lg border border-gray-100 p-1.5 flex flex-col overflow-y-auto";
                
                const eventosDia = actividades.filter(a => a.fecha === fechaStr);
                
                celda.innerHTML = `<span class="text-xs font-bold text-gray-600 mb-1">${dia}</span>`;
                
                eventosDia.forEach(ev => {
                    const badgeEv = document.createElement('div');
                    badgeEv.className = "text-[10px] bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded truncate mb-0.5 font-medium border border-blue-100";
                    badgeEv.innerText = `${ev.hora} - ${ev.titulo}`;
                    badgeEv.title = ev.titulo;
                    celda.appendChild(badgeEv);
                });

                grid.appendChild(celda);
            }
        }

        function mesAnterior() {
            fechaCalendario.setMonth(fechaCalendario.getMonth() - 1);
            renderizarCalendario();
        }

        function mesSiguiente() {
            fechaCalendario.setMonth(fechaCalendario.getMonth() + 1);
            renderizarCalendario();
        }

        // Función para Exportar a CSV
        function exportarCSV() {
            const lista = obtenerActividadesFiltradas();
            if (lista.length === 0) {
                alert("No hay actividades para exportar.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,ID,Titulo,Fecha,Hora,Lugar,Estado,Descripcion\r\n";
            lista.forEach(row => {
                const descLimpia = (row.descripcion || "").replace(/,/g, " ");
                csvContent += `${row.id},"${row.titulo}",${row.fecha},${row.hora},"${row.lugar}",${row.estado},"${descLimpia}"\r\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "actividades_institucionales.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Modal y CRUD
        function abrirModalNuevo() {
            document.getElementById('modalTitulo').innerText = "Registrar Nueva Actividad";
            document.getElementById('formActividad').reset();
            document.getElementById('actividadId').value = '';
            // Establecer fecha por defecto hoy
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalActividad').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalActividad').classList.add('hidden');
        }

        function guardarActividad(e) {
            e.preventDefault();
            const id = document.getElementById('actividadId').value;
            const titulo = document.getElementById('titulo').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const lugar = document.getElementById('lugar').value;
            const estado = document.getElementById('estado').value;
            const descripcion = document.getElementById('descripcion').value;

            if (id) {
                // Editar
                const index = actividades.findIndex(a => a.id == id);
                if (index !== -1) {
                    actividades[index] = { id: Number(id), titulo, fecha, hora, lugar, estado, descripcion };
                }
            } else {
                // Crear
                const nueva = {
                    id: Date.now(),
                    titulo, fecha, hora, lugar, estado, descripcion
                };
                actividades.push(nueva);
            }

            localStorage.setItem('actividades_inst', JSON.stringify(actividades));
            cerrarModal();
            renderizar();
        }

        function editarActividad(id) {
            const item = actividades.find(a => a.id === id);
            if (!item) return;

            document.getElementById('modalTitulo').innerText = "Editar Actividad";
            document.getElementById('actividadId').value = item.id;
            document.getElementById('titulo').value = item.titulo;
            document.getElementById('fecha').value = item.fecha;
            document.getElementById('hora').value = item.hora;
            document.getElementById('lugar').value = item.lugar;
            document.getElementById('estado').value = item.estado;
            document.getElementById('descripcion').value = item.descripcion;

            document.getElementById('modalActividad').classList.remove('hidden');
        }

        function eliminarActividad(id) {
            if (confirm("¿Estás seguro de eliminar esta actividad?")) {
                actividades = actividades.filter(a => a.id !== id);
                localStorage.setItem('actividades_inst', JSON.stringify(actividades));
                renderizar();
            }
        }
    </script>
</body>
</html>
