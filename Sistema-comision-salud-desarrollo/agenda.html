<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
     <script>
        // 1. Verificamos la sesión inmediatamente
        const sesion = sessionStorage.getItem('usuario_logueado');
        
        // 2. Si no hay sesión Y no estamos en el login, redirigimos
        // Nota: Si tu archivo de login no está en la raíz, ajusta la ruta
        if (!sesion && window.location.pathname !== "/login.html") {
            window.location.replace("login.html");
        } else {
            // 3. Si SÍ hay sesión, cuando el HTML cargue, mostramos el cuerpo
            document.addEventListener("DOMContentLoaded", () => {
                document.body.style.display = "block";
            });
        }
    </script>
    <title>Gestión de Agenda | CPS-DSI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand-azul: #0d2346; --brand-bright: #1a4f9c; --bg-gris: #f4f6f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gris); padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .btn-action { background: var(--brand-bright); color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        
        /* Modal básico */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 400px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body style="display: none;">

<div class="container">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h1>Agenda de Actividades</h1>
        <button class="btn-action" onclick="document.getElementById('modal').style.display='flex'">+ Agregar Actividad</button>
    </div>

    <div id="agenda-container">Cargando actividades...</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2>Nueva Actividad</h2>
        <input type="text" id="titulo" placeholder="Título de la actividad">
        <input type="date" id="fecha">
        <input type="text" id="lugar" placeholder="Lugar o sector">
        <button class="btn-action" onclick="guardarActividad()">Guardar Actividad</button>
        <button onclick="document.getElementById('modal').style.display='none'">Cancelar</button>
    </div>
</div>

<script>
    // Asegúrate de tener tu 'client' de Supabase inicializado arriba
    async function guardarActividad() {
        const titulo = document.getElementById('titulo').value;
        const fecha = document.getElementById('fecha').value;
        const lugar = document.getElementById('lugar').value;

        const { data, error } = await client.from('agenda').insert([{ titulo, fecha, lugar }]);
        
        if (!error) {
            alert('Actividad guardada');
            location.reload();
        } else {
            alert('Error al guardar');
        }
    }
</script>
</body>
</html>
