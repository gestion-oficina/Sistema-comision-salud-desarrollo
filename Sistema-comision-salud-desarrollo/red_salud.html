<!-- 1. Importa el cliente ESM oficial de Neon en tu HTML -->
<script type="module">
    import { neon } from 'https://cdn.jsdelivr.net/npm/@neondatabase/serverless/+esm';
    
    // 2. Tu cadena de conexión directa a Neon
    const connectionString = "postgresql://neondb_owner:npg_djCruebcPY94@ep-sparkling-math-avejx7o4-pooler.c-11.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require";
    
    // 3. Inicializas el cliente globalmente para usarlo en tus funciones
    window.sqlClient = neon(connectionString, { disableWarningInBrowsers: true });

    // 4. Llama a tu función de inicio o carga de datos existente
    if (typeof window.iniciarApp === 'function') {
        window.iniciarApp();
    }
</script>

<script>
    // 5. Ejemplo de cómo hacer consultas directas desde cualquier función tuya sin tocar tu estructura:
    async function cargarMisDatos() {
        try {
            // Consulta SELECT directa
            const resultados = await window.sqlClient(`SELECT * FROM tu_tabla ORDER BY id DESC;`);
            console.log("Datos obtenidos:", resultados);
            
            // Inserción directa
            // await window.sqlClient(`INSERT INTO tu_tabla (columna) VALUES ($1);`, ['valor']);
            
        } catch (error) {
            console.error("Error en la consulta:", error);
        }
    }

    // Tu función principal que se conectará automáticamente
    window.iniciarApp = function() {
        cargarMisDatos();
    };
</script>
